<svg
  xmlns="http://www.w3.org/2000/svg"
  width="64"
  height="64"
  viewBox="0 0 64 64"
  role="img"
  aria-label="Tiago Gil card favicon"
>
  <defs>
    <style>
      .card {
        fill: #f8f3eb;
        stroke: #d6d0c9;
        stroke-width: 1.75;
      }

      .inner {
        fill: none;
        stroke: #bf4213;
        stroke-opacity: 0.22;
        stroke-width: 1.25;
      }

      .mark {
        fill: #bf4213;
        font-family: "Fraunces", Georgia, serif;
        font-size: 34px;
        font-weight: 500;
        letter-spacing: -0.08em;
      }
    </style>
  </defs>

  <rect class="card" x="10" y="5" width="44" height="54" rx="8" />
  <rect class="inner" x="13.5" y="8.5" width="37" height="47" rx="5.5" />
  <text class="mark" x="30" y="42" text-anchor="middle">T</text>
</svg>
